spring:
  application:
    name: cafe_kios
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cafe_kios_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: cafe_owner
    password: cafe_owner123
  jpa:
    hibernate:
      ddl-auto: update # Entity 의 멤버변수가 변하면 자동으로 데이터베이스의 테이블도 갱신해준다.
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      dialect: org.hibernate.dialect.MySQL8InnoDBDialect

  web:
    resources:
      add-mappings: false # 404.html 출력 하지 마라

server:
  port: 8087
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

