<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>이메일주소를 체크 합니다.</title>
	<script src="/js/jquery.min.js"></script>
</head>
<body>
<h1>이메일 주소를 확인합니다.</h1>
<div>
	<fieldset>
		<label for="signId">사인아이디</label><input type="text" id="signId" name="signId" value="{{signId}}" />
		<label for="validText">유효한코드를 입력하세요</label><input type="text" id="validText" name="validText" maxlength="12" />
		<button id="btnCheckValid">확인</button>
	</fieldset>
</div>
</body>
</html>

<script>
    $(() => {
        $.getMember = () => {
            let data = {
                signId: $("#signId").val()
                , validText: $("#validText").val()
            };
            return data;
        }

        $("#btnCheckValid").click(() => {
            $.checkValid();
        })
        $.checkValid = () => {
            let data = $.getMember();
            $.ajax({
                url: "/checkvalidemail" // 요청 URL
                , type: "POST"          // 전송 방식 (GET, POST 등)
                , dataType: "json"      // 응답 데이터 타입
                , data: JSON.stringify(data)
                , contentType: "application/json"
            })
                .done(function(result, textStatus, jqXHR) {
                    // 요청 성공 시 실행
                    alert("성공:" + result);
                    document.location.href = "http://localhost:8181";
                })
                .fail(function(jqXHR, textStatus, errorThrown) {
                    // 요청 실패 시 실행
                    alert("실패:" + jqXHR.responseJSON.data);
                })
                .always(function() {
                    // 성공/실패 관계없이 항상 실행
                });
        }

        $.clearInputBox = () => {
            let data = {
                id: ""
                , signId: ""
                , email: ""
                , password: ""
            };
            $.viewMember(data);
        }

        $.searchList = (page) => {

        }
    });
</script>
