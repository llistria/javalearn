version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb-local
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass123!
      MARIADB_DATABASE: appdb
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass123!
    ports:
      - "3308:3306"
    volumes:
      - ./data:/var/lib/mysql
      # - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -prootpass123! || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: [
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_general_ci"
    ]