<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nintendo Game Manager</title>
    <link rel="stylesheet" href="/css/0108-1.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- JS 파일 -->
    <script src="/js/0108-1.js"></script>
</head>
<body>

<div class="container">

    <h1>Nintendo Game Manager</h1>

    <!-- 입력 영역 -->
    <div class="input-area">
        <input type="hidden" id="id">

        <div class="form-row">
            <label>게임명</label>
            <input type="text" id="name" placeholder="게임명을 입력하세요">
        </div>

        <div class="form-row">
            <label>장르</label>
            <select id="genre">
                <option value="A">액션</option>
                <option value="S">스포츠</option>
                <option value="R">RPG</option>
            </select>
        </div>

        <div class="form-row">
            <label>연령등급</label>
            <select id="grade">
                <option value="ALL">전체이용</option>
                <option value="13">13세 이상</option>
                <option value="18">18세 이상</option>
            </select>
        </div>

        <div class="form-row">
            <label>가격</label>
            <input type="number" id="price" placeholder="가격 입력">
        </div>

        <div class="form-row">
            <label>이미지 URL</label>
            <input type="text" id="imgUrl" placeholder="http:// 로 시작하는 이미지 URL">
        </div>

        <div class="image-preview">
            <img id="showImage" src="" alt="이미지 미리보기">
        </div>

        <div class="button-group">
            <button id="btnAdd">추가</button>
            <button id="btnUpt">수정</button>
            <button id="btnDel">삭제</button>
        </div>
    </div>

    <!-- 리스트 출력 영역 -->
    <div class="listDataBlock"></div>

</div>

</body>
</html>
