spring:
  application:
    name: PetApp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/petshop_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: petshop_owner
    password: petshop9876!
  jpa:
    hibernate:
      ddl-auto: update # Entity 의 멤버변수가 변하면 자동으로 데이터베이스의 테이블도 갱신해준다.
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      dialect: org.hibernate.dialect.MySQL8InnoDBDialect
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  port: 8084
