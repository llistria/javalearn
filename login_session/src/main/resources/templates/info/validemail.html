<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>이메일 주소를 확인하세요</title>
</head>
<body>
	<div>
		<div>
			{{signId}}의 이메일 주소 {{email}}에 대한 코드를 보냈습니다.
			<b>{{validText}}</b>
		</div>
		<div>
			<a href="http://localhost:8282/api/v1/auth/checkvalidemail?signId={{signId}}&validText={{validText}}" target="_blank">주소를 클릭하세요</a>
		</div>
		<div>
			<div>위의 주소가 에러나면 아래의 주소에서 코드 <b>{{validText}}</b> 을 직접 입력하세요</div>
			<a href="http://localhost:8282/checkemail?id={{signId}}" target="_blank">주소를 클릭하고 코드를 입력하세요</a>
		</div>
	</div>
</body>
</html>
